name: Build Glowmate APK

on:
  push:
    branches: [ nullifier-improvements ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake autopoint bc bison \
            build-essential bzip2 cmake curl gettext git lib32stdc++6 \
            lib32z1 libtool m4 nasm ninja-build pkg-config python-is-python3 \
            ruby ruby-dev unzip yasm zip swig

      - name: Install Android NDK and CMake
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;29.0.14206865" "cmake;4.1.2" "platforms;android-36" "build-tools;35.0.0"

      - name: Build Glowmate APK
        run: |
          cd jami-android
          export ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/29.0.14206865
          ./gradlew assembleWithoutFirebaseDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Glowmate-debug
          path: jami-android/app/build/outputs/apk/**/**.apk
          retention-days: 7
