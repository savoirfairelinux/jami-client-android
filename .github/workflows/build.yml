name: Build Glowmate APK

on:
  push:
    branches: [ nullifier-improvements ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd jami-android
          ./gradlew assembleWithoutFirebaseDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Glowmate-debug
          path: jami-android/app/build/outputs/apk/**/**.apk
